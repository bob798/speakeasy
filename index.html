<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speakeasy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:     #f7f3ee;
      --cream-dark:#ede7de;
      --ink:       #2c2416;
      --ink-light: #7a6e62;
      --sage:      #7a9e87;
      --sage-dark: #5c8069;
      --sage-light:#c8ddd0;
      --bubble-ai: #ffffff;
      --bubble-user: #e8f0eb;
      --shadow:    rgba(44,36,22,0.08);
      --radius:    18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--cream);
      border-bottom: 1px solid var(--cream-dark);
      flex-shrink: 0;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .header-info h1 {
      font-family: 'Lora', serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.2;
    }

    .status {
      font-size: 12px;
      color: var(--sage-dark);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--sage);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .end-btn {
      background: transparent;
      border: 1.5px solid var(--cream-dark);
      color: var(--ink-light);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .end-btn:hover {
      border-color: var(--sage);
      color: var(--sage-dark);
      background: var(--sage-light);
    }

    /* ── Chat Area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 4px; }

    /* ── Welcome ── */
    .welcome {
      text-align: center;
      padding: 32px 16px 16px;
      animation: fadeUp 0.6s ease;
    }

    .welcome-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }

    .welcome h2 {
      font-family: 'Lora', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .welcome p {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.7;
      max-width: 280px;
      margin: 0 auto 20px;
    }

    .topic-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 340px;
      margin: 0 auto;
    }

    .chip {
      background: white;
      border: 1.5px solid var(--cream-dark);
      color: var(--ink);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .chip:hover {
      border-color: var(--sage);
      background: var(--sage-light);
      color: var(--sage-dark);
      transform: translateY(-1px);
    }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease;
      max-width: 100%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    }

    .msg.user .msg-avatar {
      background: var(--cream-dark);
    }

    .bubble {
      max-width: calc(100% - 80px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.6;
      box-shadow: 0 1px 4px var(--shadow);
    }

    .msg.ai .bubble {
      background: var(--bubble-ai);
      border-bottom-left-radius: 4px;
      color: var(--ink);
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      border-bottom-right-radius: 4px;
      color: var(--ink);
    }

    /* ── Typing indicator ── */
    .typing .bubble {
      padding: 14px 18px;
    }

    .dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dots span {
      width: 7px;
      height: 7px;
      background: var(--sage);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Today's Tip card ── */
    .tip-card {
      background: linear-gradient(135deg, var(--sage-dark) 0%, var(--sage) 100%);
      border-radius: var(--radius);
      padding: 20px;
      color: white;
      animation: fadeUp 0.5s ease;
      box-shadow: 0 4px 16px rgba(92,128,105,0.3);
    }

    .tip-card .tip-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .tip-card .tip-text {
      font-family: 'Lora', serif;
      font-size: 16px;
      line-height: 1.6;
    }

    .tip-card .tip-restart {
      margin-top: 16px;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.4);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tip-card .tip-restart:hover {
      background: rgba(255,255,255,0.3);
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 20px;
      background: var(--cream);
      border-top: 1px solid var(--cream-dark);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: white;
      border: 1.5px solid var(--cream-dark);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--sage);
    }

    #input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      min-height: 24px;
    }

    #input::placeholder {
      color: var(--ink-light);
      opacity: 0.7;
    }

    #send {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(92,128,105,0.3);
    }

    #send:hover { transform: scale(1.08); }
    #send:active { transform: scale(0.95); }
    #send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    #send svg { pointer-events: none; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--ink-light);
      opacity: 0.6;
      margin-top: 8px;
    }

    /* ── Divider ── */
    .divider {
      text-align: center;
      font-size: 12px;
      color: var(--ink-light);
      opacity: 0.5;
      position: relative;
      margin: 4px 0;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--cream-dark);
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <div class="avatar">🌿</div>
    <div class="header-info">
      <h1>Alex</h1>
      <div class="status">随时可以聊</div>
    </div>
  </div>
  <button class="end-btn" onclick="endSession()">结束对话</button>
</header>

<!-- Chat -->
<div id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">👋</span>
    <h2>Hi, I'm Alex!</h2>
    <p>今天想聊什么？随便说，没有对错，就像和朋友聊天一样。</p>
    <div class="topic-chips">
      <button class="chip" onclick="startWith('My day at work')">💼 工作日常</button>
      <button class="chip" onclick="startWith('Something funny happened today')">😄 趣事分享</button>
      <button class="chip" onclick="startWith('I watched a great movie recently')">🎬 影视剧</button>
      <button class="chip" onclick="startWith('I want to talk about travel')">✈️ 旅行计划</button>
      <button class="chip" onclick="startWith('Let me tell you about my weekend')">🌿 周末生活</button>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Type in English... just like texting a friend"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send" onclick="sendMessage()" title="发送">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
      </svg>
    </button>
  </div>
  <div class="hint">Enter 发送 · Shift+Enter 换行</div>
</div>

<script>
  const API = 'http://localhost:8000';
  let sessionId = crypto.randomUUID();
  let history = [];
  let isLoading = false;

  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function startWith(text) {
    input.value = text;
    autoResize(input);
    input.focus();
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function addMessage(role, content) {
    hideWelcome();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'ai' ? '🌿' : '🙂';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    scrollDown();
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai typing';
    wrap.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🌿';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    scrollDown();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function scrollDown() {
    setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
  }

  function setLoading(val) {
    isLoading = val;
    sendBtn.disabled = val;
    input.disabled = val;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    setLoading(true);

    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          message: text,
          history: history
        })
      });

      const data = await res.json();
      removeTyping();

      if (res.ok) {
        const reply = data.reply;
        addMessage('ai', reply);
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: reply });
      } else {
        addErrorMsg(data.error || '出了点问题，再试一次？');
      }
    } catch (e) {
      removeTyping();
      addErrorMsg('连接不上服务，确认后端已启动（localhost:8000）');
    }

    setLoading(false);
    input.focus();
  }

  function addErrorMsg(msg) {
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;font-size:13px;color:#c0826a;padding:4px;';
    div.textContent = '⚠ ' + msg;
    chat.appendChild(div);
    scrollDown();
  }

  async function endSession() {
    if (history.length === 0) return;

    const btn = document.querySelector('.end-btn');
    btn.textContent = '生成中...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API}/chat/summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          history: history
        })
      });

      const data = await res.json();

      // 分割线
      const div = document.createElement('div');
      div.className = 'divider';
      div.textContent = '今日对话结束';
      chat.appendChild(div);

      if (res.ok) {
        showTipCard(data.tip);
      } else {
        addErrorMsg('今日一句生成失败');
      }
    } catch (e) {
      addErrorMsg('连接失败，请重试');
    }

    btn.textContent = '结束对话';
    btn.disabled = false;
  }

  function showTipCard(tip) {
    const card = document.createElement('div');
    card.className = 'tip-card';
    card.innerHTML = `
      <div class="tip-label">✨ 今日收获</div>
      <div class="tip-text">${tip}</div>
      <button class="tip-restart" onclick="restartSession()">开始新对话</button>
    `;
    chat.appendChild(card);
    scrollDown();

    // 禁用输入
    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = '点击「开始新对话」继续';
  }

  function restartSession() {
    sessionId = crypto.randomUUID();
    history = [];
    chat.innerHTML = '';
    input.disabled = false;
    sendBtn.disabled = false;
    input.placeholder = 'Type in English... just like texting a friend';

    // 重新插入欢迎页
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    welcome.innerHTML = `
      <span class="welcome-icon">👋</span>
      <h2>Hi, I'm Alex!</h2>
      <p>今天想聊什么？随便说，没有对错，就像和朋友聊天一样。</p>
      <div class="topic-chips">
        <button class="chip" onclick="startWith('My day at work')">💼 工作日常</button>
        <button class="chip" onclick="startWith('Something funny happened today')">😄 趣事分享</button>
        <button class="chip" onclick="startWith('I watched a great movie recently')">🎬 影视剧</button>
        <button class="chip" onclick="startWith('I want to talk about travel')">✈️ 旅行计划</button>
        <button class="chip" onclick="startWith('Let me tell you about my weekend')">🌿 周末生活</button>
      </div>
    `;
    chat.appendChild(welcome);
    input.focus();
  }
</script>
</body>
</html>
